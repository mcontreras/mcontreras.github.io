---
layout: default
---
<div class="about-page">
  <div class="wrap">
    <div class="page-head">
      <h1 class="page-title">{{ page.title }}</h1>
      {% if page.description %}
      <p class="page-desc">{{ page.description }}</p>
      {% endif %}
    </div>
    <div class="about-content">
      {{ content }}
    </div>
  </div>
</div>
