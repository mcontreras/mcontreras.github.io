<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900;1,14..32,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,800;1,9..144,400;1,9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  {% seo %}
</head>
<body>
  {% include header.html %}
  <main class="main">
    {{ content }}
  </main>
  {% include footer.html %}

  <!-- Banner de cookies -->
  <div id="cookie-banner" style="display:none" role="dialog" aria-label="Aviso de cookies">
    <p>Uso Google Analytics para saber cuántas personas visitan el sitio. ¿Aceptas las cookies analíticas?</p>
    <div class="cookie-actions">
      <button onclick="setCookies('rejected')" class="cookie-btn cookie-btn--secondary">No, gracias</button>
      <button onclick="setCookies('accepted')" class="cookie-btn cookie-btn--primary">Aceptar</button>
    </div>
  </div>

  <script>
    // Theme
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      var icon = theme === 'dark' ? '☽' : '☀';
      ['themetoggle','themetoggle-mobile'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.textContent = id === 'themetoggle-mobile' ? icon + '\u00a0 Cambiar tema' : icon;
      });
    }

    // Aplica el tema al cargar: prioridad → preferencia manual → preferencia del sistema
    (function() {
      var saved = localStorage.getItem('theme');
      var preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      applyTheme(saved || preferred);
    })();

    // Escucha cambios en el tema del sistema en tiempo real
    // Solo aplica si el usuario no ha elegido manualmente un tema
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
      if (!localStorage.getItem('theme')) {
        applyTheme(e.matches ? 'dark' : 'light');
      }
    });

    function toggleTheme() {
      var current = document.documentElement.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      localStorage.setItem('theme', next);
      applyTheme(next);
    }

    // Google Analytics — solo carga si hay consentimiento
    function loadGA() {
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=G-VP27VJ8NEE';
      document.head.appendChild(s);
      window.dataLayer = window.dataLayer || [];
      function gtag(){ dataLayer.push(arguments); }
      window.gtag = gtag;
      gtag('js', new Date());
      gtag('config', 'G-VP27VJ8NEE');
    }

    // Cookies: gestión de consentimiento
    function setCookies(choice) {
      localStorage.setItem('cookies', choice);
      document.getElementById('cookie-banner').style.display = 'none';
      if (choice === 'accepted') loadGA();
    }

    (function() {
      var consent = localStorage.getItem('cookies');
      if (consent === 'accepted') {
        loadGA();
      } else if (!consent) {
        // Sin decisión previa → mostrar banner
        document.getElementById('cookie-banner').style.display = 'flex';
      }
      // Si es 'rejected', no se muestra nada ni se carga GA
    })();

    // Mobile menu
    function toggleMenu() {
      var btn = document.getElementById('nav-hamburger');
      var dd  = document.getElementById('nav-dropdown');
      if (!btn || !dd) return;
      var open = dd.classList.toggle('open');
      btn.classList.toggle('open', open);
      btn.setAttribute('aria-expanded', open);
    }

    document.addEventListener('click', function(e) {
      var nav = document.getElementById('nav');
      if (nav && !nav.contains(e.target)) {
        var dd  = document.getElementById('nav-dropdown');
        var btn = document.getElementById('nav-hamburger');
        if (dd)  dd.classList.remove('open');
        if (btn) btn.classList.remove('open');
      }
    });
  </script>
</body>
</html>
